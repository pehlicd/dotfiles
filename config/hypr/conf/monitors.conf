# Monitor Configuration
# Edit manually or use: nwg-displays (SUPER+CTRL+M) for a GUI editor
#
# Format: monitor = name, resolution@hz, position, scale
# Examples:
#   Single:  monitor = eDP-1, 2560x1440@165, 0x0, 1.25
#   Dual:    monitor = eDP-1, 1920x1080@60, 0x0, 1
#            monitor = HDMI-A-1, 2560x1440@144, 1920x0, 1
#   Mirror:  monitor = HDMI-A-1, 1920x1080@60, 0x0, 1, mirror, eDP-1
#
# Use 'hyprctl monitors all' to list connected monitors
# Auto-detect fallback (plug & play):

env = GDK_SCALE,1
monitor = ,preferred,auto,1
